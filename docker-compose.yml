networks:
  tvcast-network:
    driver: bridge

volumes:
  db_data:

services:
  api:
    build: ./apps/api
    container_name: tvcast-api
    volumes:
      - ./apps/api:/var/www/html
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=tvcast
      - DB_USERNAME=root
      - DB_PASSWORD=secret
      - REDIS_HOST=redis
    depends_on:
      - db
      - redis
    networks:
      - tvcast-network

  web:
    build: ./apps/web
    container_name: tvcast-web
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000/api
    networks:
      - tvcast-network

  db:
    image: mysql:8.0
    container_name: tvcast-db
    environment:
      MYSQL_DATABASE: tvcast
      MYSQL_ROOT_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - tvcast-network

  redis:
    image: redis:alpine
    container_name: tvcast-redis
    networks:
      - tvcast-network